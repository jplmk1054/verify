<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f7f8fa;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.box {
  background: #fff;
  width: 100%;
  max-width: 500px;
  border-radius: 24px;
  padding: 30px 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.title {
  text-align: center;
  font-size: 19px;
  font-weight: 600;
  margin-bottom: 16px;
  color: #222;
}

.desc {
  text-align: center;
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.target-area {
  background: #eef6ff;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  margin-bottom: 24px;
}

.target-label {
  font-size: 13px;
  color: #555;
  margin-bottom: 8px;
}

.target-nums {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 10px;
  color: #007aff;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.num-btn {
  aspect-ratio: 1;
  border-radius: 16px;
  border: 2px solid #e0e0e0;
  background: #fff;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.num-btn:active {
  transform: scale(0.95);
}

.num-btn.selected {
  background: #007aff;
  color: #fff;
  border-color: #007aff;
}

.submit-btn {
  width: 100%;
  padding: 18px;
  border-radius: 18px;
  background: #007aff;
  color: #fff;
  font-size: 17px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

.submit-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.submit-btn:active {
  transform: scale(0.98);
}

.status {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: #888;
}
</style>
</head>

<body>
<div class="box">
  <div class="title">選択認証</div>
  <div class="desc">表示された数字をすべて選んでください</div>

  <div class="target-area">
    <div class="target-label">対象</div>
    <div class="target-nums" id="target"></div>
  </div>

  <div class="grid" id="grid"></div>

  <button class="submit-btn" id="submit" disabled>確認</button>
  <div class="status" id="status">選択してください</div>
</div>

<script>
// ==========================
// 目標URLリスト（複数設定OK）
// ==========================
const TARGET_LIST = [
  "https://www.google.com",
  "https://www.youtube.com",
  "https://www.amazon.com"
];

// ランダムで一つ選ぶ
function getRandomTarget() {
  return TARGET_LIST[Math.floor(Math.random() * TARGET_LIST.length)];
}

// 認証生成
function generate() {
  const numbers = "0123456789".split("");
  const need = 2;
  const target = [];

  while (target.length < need) {
    const n = numbers[Math.floor(Math.random() * numbers.length)];
    if (!target.includes(n)) target.push(n);
  }

  const options = [...target];
  while (options.length < 8) {
    const n = numbers[Math.floor(Math.random() * numbers.length)];
    if (!options.includes(n)) options.push(n);
  }

  options.sort(() => Math.random() - 0.5);
  return { target, options, need };
}

const { target, options, need } = generate();
document.getElementById("target").innerText = target.join("   ");

const grid = document.getElementById("grid");
const submit = document.getElementById("submit");
const status = document.getElementById("status");
let selected = [];

options.forEach(o => {
  const btn = document.createElement("button");
  btn.className = "num-btn";
  btn.innerText = o;
  btn.dataset.v = o;

  btn.onclick = () => {
    if (btn.classList.contains("selected")) {
      btn.classList.remove("selected");
      selected = selected.filter(x => x !== o);
    } else {
      btn.classList.add("selected");
      selected.push(o);
    }

    submit.disabled = selected.length !== need;
    status.innerText = `${selected.length}/${need} 個選択中`;
  };

  grid.appendChild(btn);
});

submit.onclick = () => {
  const ok = target.every(t => selected.includes(t)) && selected.length === target.length;
  if (ok) {
    status.innerText = "認証成功！";
    location.href = getRandomTarget();
  } else {
    alert("認証に失敗しました");
  }
};
</script>
</body>
</html>
